<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Humorki i zachcianki – karty do przesuwania</title>
  <style>
    :root {
      --bg: #F7F4EF;
      --card: #FFFFFF;
      --accent: #6B8F71;
      --accent-light: #EAF1EB;
      --text: #2D2D2D;
      --muted: #6B6B6B;
      --border: #E0DDD7;
      --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: linear-gradient(135deg, #5C7A62 0%, #8FAF72 100%);
      color: #fff;
      padding: 28px 20px 20px;
      text-align: center;
    }
    .header h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 6px; }
    .header p { font-size: .88rem; opacity: .88; }

    .trimester-nav {
      display: flex; gap: 8px; padding: 14px 16px;
      justify-content: center;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .trimester-chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--card);
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .trimester-chip.active {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--text);
    }
    .trimester-chip:hover {
      background: var(--accent-light);
      border-color: var(--accent);
    }

    .stack-container {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    .card {
      position: absolute;
      width: 90%;
      max-width: 480px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      cursor: grab;
      user-select: none;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .card:active { cursor: grabbing; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .card-week {
      font-size: .82rem;
      font-weight: 600;
      color: var(--accent);
    }
    .card-emoji {
      font-size: 1.6rem;
    }
    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
    }

    .card-section {
      margin-bottom: 12px;
    }
    .card-section-title {
      font-size: .88rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text);
    }
    .card-list {
      list-style: none;
      padding: 0;
    }
    .card-list li {
      font-size: .82rem;
      margin-bottom: 4px;
      padding-left: 16px;
      position: relative;
    }
    .card-list li::before {
      content: '•';
      position: absolute;
      left: 0;
      color: var(--muted);
    }
    .card-list.do li {
      color: #2F6F3E;
    }
    .card-list.do li::before {
      content: '✓';
      color: #2F6F3E;
    }
    .card-list.dont li {
      color: #9B2C2C;
    }
    .card-list.dont li::before {
      content: '✗';
      color: #9B2C2C;
    }

    .bottom-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .bottom-btn {
      padding: 8px 20px;
      border-radius: 20px;
      border: none;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-skip {
      background: #E0DDD7;
      color: var(--text);
    }
    .btn-skip:hover {
      background: #D0CCC7;
    }
    .btn-save {
      background: var(--accent);
      color: #fff;
    }
    .btn-save:hover {
      background: #5C7A62;
    }
    .counter {
      font-size: .82rem;
      color: var(--muted);
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .empty-state .emoji {
      font-size: 3rem;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

<div class="header">
  <h1>💑 Humorki i zachcianki</h1>
  <p>Przesuwaj karty, żeby zobaczyć, co może się dziać u niej i jak możesz reagować</p>
</div>

<div class="trimester-nav">
  <div class="trimester-chip active" data-trimester="I">I trymestr</div>
  <div class="trimester-chip" data-trimester="II">II trymestr</div>
  <div class="trimester-chip" data-trimester="III">III trymestr</div>
  <div class="trimester-chip" data-trimester="IV">IV trymestr</div>
</div>

<div class="stack-container" id="stackContainer">
  <!-- karty wygenerowane przez JS -->
</div>

<div class="bottom-bar">
  <button class="bottom-btn btn-skip" id="skipBtn">Pomiń</button>
  <span class="counter" id="counter">1/12</span>
  <button class="bottom-btn btn-save" id="saveBtn">Zapisz</button>
</div>

<script>
const CARDS = [
  {
    id: '4-6',
    weekRange: '4–6 tydzień',
    emoji: '🌱',
    title: 'Szok po teście',
    herSide: [
      'Huśtawka emocji: radość i lęk tego samego dnia.',
      'Silne zmęczenie, senność, pierwsze nudności.',
      'Nadwrażliwość na zapachy, wstręt do części potraw.'
    ],
    do: [
      'Mów, że jej emocje są normalne na tym etapie.',
      'Przejmij obowiązki związane z intensywnymi zapachami.',
      'Delikatnie zachęć do pierwszej wizyty u lekarza.'
    ],
    dont: [
      'Nie wyśmiewaj płaczu ani lęku.',
      'Nie bagatelizuj nudności tekstem „przesadzasz".'
    ],
    trimester: 'I'
  },
  {
    id: '7-10',
    weekRange: '7–10 tydzień',
    emoji: '🎢',
    title: 'Hormonalny rollercoaster',
    herSide: [
      'Silne wahania nastroju: od śmiechu do łez w minutę.',
      'Mocne nudności, zmęczenie, nadwrażliwość na zapachy.',
      'Wyraźne zachcianki i awersje do jedzenia.'
    ],
    do: [
      'Traktuj jej emocje poważnie, nawet jeśli sytuacja wydaje się błaha.',
      'Zadbaj o lekkie przekąski pod ręką.',
      'Ustalcie hasło „pauza", gdy rozmowa wymyka się spod kontroli.'
    ],
    dont: [
      'Nie mów „to tylko hormony, ogarnij się".',
      'Nie żartuj z jej zachcianek przy innych, jeśli sama tego nie robi.'
    ],
    trimester: 'I'
  },
  {
    id: '11-13',
    weekRange: '11–13 tydzień',
    emoji: '🌿',
    title: 'Pierwsze oswojenie ciąży',
    herSide: [
      'Część objawów słabnie, ale wciąż jest zmęczona.',
      'Więcej myślenia o finansach, mieszkaniu, pracy.',
      'Wrażliwość na komentarze z zewnątrz.'
    ],
    do: [
      'Zaproponuj spokojną rozmowę o planach i finansach.',
      'Jasno mów, że jesteście „w tym razem".',
      'Wzmacniaj: „masz prawo się bać, to duża zmiana".'
    ],
    dont: [
      'Nie narzucaj lektur o „idealnym macierzyństwie".',
      'Nie krytykuj jej ciała ani diety.'
    ],
    trimester: 'I'
  },
  {
    id: '14-18',
    weekRange: '14–18 tydzień',
    emoji: '✨',
    title: 'Złoty okres',
    herSide: [
      'Mniej nudności, więcej energii, lepszy nastrój.',
      'Czuje się „bardziej sobą", ale z brzuchkiem.',
      'W tle niepokój o badania (USG połówkowe).'
    ],
    do: [
      'Umawiaj małe przyjemności: spacery, wyjście do kina.',
      'Idź z nią na ważne badania, interesuj się wynikami.',
      'Mów konkretnie, co w niej lubisz teraz.'
    ],
    dont: [
      'Nie zakładaj, że skoro jest „lepiej", to nie potrzebuje wsparcia.',
      'Nie rozkręcaj czarnych scenariuszy przed badaniami.'
    ],
    trimester: 'II'
  },
  {
    id: '19-23',
    weekRange: '19–23 tydzień',
    emoji: '🤱',
    title: 'Ruchy dziecka i zachcianki 2.0',
    herSide: [
      'Pierwsze wyczuwalne ruchy dziecka → wzruszenie + lęk.',
      'Cravings bywają silne (konkretne produkty, dziwne połączenia).',
      'Bóle kręgosłupa, skurcze łydek, zgaga nasilają się.'
    ],
    do: [
      'Traktuj ruchy dziecka jako „wasz rytuał": pytaj, czy chce, żebyś przyłożył rękę.',
      'Z umiarem spełniaj zachcianki.',
      'Proponuj masaż pleców / nóg, organizuj przerwy na leżenie.'
    ],
    dont: [
      'Nie panikuj przy każdym dniu z mniejszą ilością ruchów.',
      'Nie krytykuj jej wyborów jedzeniowych przy innych.'
    ],
    trimester: 'II'
  },
  {
    id: '24-27',
    weekRange: '24–27 tydzień',
    emoji: '🤰',
    title: 'Więcej brzucha, więcej pytań',
    herSide: [
      'Brzuch coraz większy, ciało „inne" niż dotąd.',
      'Wzrost lęku: „czy dam sobie radę jako mama?"',
      'Gorszy sen: wiercenie się, częste pobudki do toalety.'
    ],
    do: [
      'Mów, co w niej podziwiasz oprócz „bycia w ciąży".',
      'Ustalcie z grubsza podział obowiązków po porodzie.',
      'Pomagaj logistycznie (zakupy, sprzątanie, formalności).'
    ],
    dont: [
      'Nie żartuj z jej ciała („hipopotam", „wieloryb").',
      'Nie sugeruj, że „po porodzie szybko wrócisz do formy".'
    ],
    trimester: 'II'
  },
  {
    id: '28-32',
    weekRange: '28–32 tydzień',
    emoji: '😮‍💨',
    title: 'Ciężej fizycznie, znów huśtawka',
    herSide: [
      'Nasilone bóle pleców, bioder, obrzęki, duszność.',
      'Druga fala huśtawek nastroju – hormony + dyskomfort.',
      'Coraz większy lęk przed porodem, szczególnie po „historiach grozy".'
    ],
    do: [
      'Bądź „filtrem" na opowieści innych – odcinaj od niej niepotrzebne straszaki.',
      'Zaproponuj zapisanie się razem do szkoły rodzenia.',
      'Przejmij większość zadań wymagających długiego stania.'
    ],
    dont: [
      'Nie opowiadaj dla „beki" historii o ciężkich porodach.',
      'Nie mów „miliony kobiet rodziły i żyją".'
    ],
    trimester: 'III'
  },
  {
    id: '33-37',
    weekRange: '33–37 tydzień',
    emoji: '🧹',
    title: 'Gniazdowanie i nerwy końcówki',
    herSide: [
      'Silna potrzeba sprzątania, układania, przygotowywania.',
      'Nadwrażliwość na komentarze o brzuchu, wadze, terminie.',
      'Lęk: „czy ty będziesz przy mnie?", „czy mnie wesprzesz?"'
    ],
    do: [
      'Pomóż jej mądrze gniazdować: ty myjesz okna, ona sortuje ubranka.',
      'Jasno deklaruj, jak zamierzasz ją wspierać w porodzie i po nim.',
      'Chroń ją przed „dobrymi radami" rodziny, jeśli to ją przytłacza.'
    ],
    dont: [
      'Nie krytykuj jej potrzeby porządków („przesada z tym sprzątaniem").',
      'Nie umawiaj masy wizyt i gości „przed porodem".'
    ],
    trimester: 'III'
  },
  {
    id: '38-42',
    weekRange: '38–42 tydzień',
    emoji: '⏳',
    title: 'Czekanie, które męczy',
    herSide: [
      'Skrajne zmęczenie, poczucie bycia „uwięzioną we własnym ciele".',
      'Irytacja pytaniami: „Jeszcze nie urodziłaś?"',
      'Bóle przepowiadające, fałszywe alarmy – lęk, czy rozpozna „ten" moment.'
    ],
    do: [
      'Przejmij kontakty z rodziną („jak u was, już?"), żeby ją odciążyć.',
      'Przypominaj: „twoje ciało wie, co robi".',
      'Trzymaj zapięty plan: torba do szpitala, dokumenty, trasa.'
    ],
    dont: [
      'Nie żartuj „wypadnij w końcu z tym brzuchem".',
      'Nie naciskaj na seks / chodzenie po schodach „żeby wywołać poród".'
    ],
    trimester: 'III'
  },
  {
    id: '0-3pp',
    weekRange: '0–3 tyg. po porodzie',
    emoji: '👶',
    title: 'Szok noworodkowy',
    herSide: [
      'Skrajne zmęczenie, ból po porodzie, krwawienie połogowe.',
      'Baby blues: płaczliwość, drażliwość, wahania nastroju.',
      'Ogromne napięcie wokół karmienia i opieki nad dzieckiem.'
    ],
    do: [
      'Przejmij logistykę: jedzenie, wodę, leki, gości – ona ma prawo leżeć.',
      'Mów: „to normalne, że płaczesz po takim wysiłku".',
      'Bądź jej adwokatem przy rodzinie („na razie bez odwiedzin").'
    ],
    dont: [
      'Nie oceniaj, jak karmi, trzyma czy usypia dziecko.',
      'Nie narzucaj wizyt teściów / znajomych „bo się obrażą".'
    ],
    trimester: 'IV'
  },
  {
    id: '4-8pp',
    weekRange: '4–8 tyg. po porodzie',
    emoji: '🌊',
    title: 'Huśtawka tożsamości',
    herSide: [
      'Miłość do dziecka + żal za dawnym życiem, wolnością, ciałem.',
      'Wahania nastroju przez brak snu, izolację, odpowiedzialność.',
      'Poczucie winy, że „nie cieszy się tak, jak powinna".'
    ],
    do: [
      'Uznaj jej ambiwalencję: „można kochać dziecko i tęsknić za dawnym życiem".',
      'Daj jej czas tylko dla siebie: 1–2 godziny, gdy ty ogarniasz.',
      'Regularnie pytaj „jak ty się masz?" – nie tylko „jak dziecko?".'
    ],
    dont: [
      'Nie odpowiadaj na trudne emocje od razu radami („zapisz się na jogę").',
      'Nie porównuj jej do „idealnych" mam z internetu.'
    ],
    trimester: 'IV'
  },
  {
    id: '9-12pp',
    weekRange: '9–12 tyg. po porodzie',
    emoji: '🌅',
    title: 'Mgła powoli się rozchodzi… albo gęstnieje',
    herSide: [
      'U części kobiet poprawa – lepszy rytm dnia, trochę więcej snu.',
      'U innych utrwalone objawy depresji: smutek, poczucie beznadziei.',
      'Stres na myśl o powrocie do pracy / zmianie trybu życia.'
    ],
    do: [
      'Obserwuj: jeśli smutek trwa tygodniami, zachęć do wizyty u lekarza.',
      'Planujcie małe, realne kroki powrotu do świata (spacer, kawa).',
      'Dbaj o swoje zasoby (sen, wsparcie) – spokojny partner to większe oparcie.'
    ],
    dont: [
      'Nie mów „inni mają gorzej" ani „weź się w garść".',
      'Nie zamiataj tematu pod dywan – to nie „minie samo" zawsze.'
    ],
    trimester: 'IV'
  }
];

let selectedTrimester = 'I';
let currentIndex = 0;
let filteredCards = [];

const stackContainer = document.getElementById('stackContainer');
const counter = document.getElementById('counter');
const skipBtn = document.getElementById('skipBtn');
const saveBtn = document.getElementById('saveBtn');

function filterCards() {
  filteredCards = CARDS.filter(c => c.trimester === selectedTrimester);
  currentIndex = 0;
  renderStack();
  updateCounter();
}

function renderStack() {
  stackContainer.innerHTML = '';

  if (filteredCards.length === 0) {
    stackContainer.innerHTML = '<div class="empty-state"><div class="emoji">🤷</div><p>Brak kart dla tego trymestru</p></div>';
    return;
  }

  const visibleCount = Math.min(3, filteredCards.length - currentIndex);

  for (let i = 0; i < visibleCount; i++) {
    const cardIndex = currentIndex + i;
    const card = filteredCards[cardIndex];
    const cardEl = createCardElement(card, i);
    stackContainer.appendChild(cardEl);
  }
}

function createCardElement(card, stackPosition) {
  const div = document.createElement('div');
  div.className = 'card';
  div.dataset.id = card.id;

  const scale = 1 - stackPosition * 0.03;
  const translateY = stackPosition * 8;
  const opacity = 1 - stackPosition * 0.1;
  const zIndex = 100 - stackPosition;

  div.style.transform = `translateY(${translateY}px) scale(${scale})`;
  div.style.opacity = opacity;
  div.style.zIndex = zIndex;

  div.innerHTML = `
    <div class="card-header">
      <div class="card-week">${card.weekRange}</div>
      <div class="card-emoji">${card.emoji}</div>
    </div>
    <div class="card-title">${card.title}</div>

    <div class="card-section">
      <div class="card-section-title">Co może się dziać u niej</div>
      <ul class="card-list">
        ${card.herSide.map(item => `<li>${item}</li>`).join('')}
      </ul>
    </div>

    <div class="card-section">
      <div class="card-section-title">Co robić</div>
      <ul class="card-list do">
        ${card.do.map(item => `<li>${item}</li>`).join('')}
      </ul>
    </div>

    <div class="card-section">
      <div class="card-section-title">Czego nie robić</div>
      <ul class="card-list dont">
        ${card.dont.map(item => `<li>${item}</li>`).join('')}
      </ul>
    </div>
  `;

  if (stackPosition === 0) {
    let startX = 0;
    let currentX = 0;

    div.addEventListener('mousedown', dragStart);
    div.addEventListener('touchstart', dragStart);

    function dragStart(e) {
      if (e.type === 'mousedown') {
        startX = e.clientX;
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', dragEnd);
      } else {
        startX = e.touches[0].clientX;
        document.addEventListener('touchmove', drag);
        document.addEventListener('touchend', dragEnd);
      }
    }

    function drag(e) {
      const clientX = e.type === 'mousemove' ? e.clientX : e.touches[0].clientX;
      currentX = clientX - startX;
      const rotation = currentX / 20;
      div.style.transform = `translateX(${currentX}px) rotate(${rotation}deg)`;
    }

    function dragEnd() {
      document.removeEventListener('mousemove', drag);
      document.removeEventListener('mouseup', dragEnd);
      document.removeEventListener('touchmove', drag);
      document.removeEventListener('touchend', dragEnd);

      if (Math.abs(currentX) > 100) {
        swipeCard(currentX > 0 ? 'right' : 'left');
      } else {
        div.style.transform = '';
        div.style.transition = 'transform 0.3s ease';
        setTimeout(() => {
          div.style.transition = '';
        }, 300);
      }

      currentX = 0;
      startX = 0;
    }
  }

  return div;
}

function swipeCard(direction) {
  const topCard = stackContainer.querySelector('.card');
  if (!topCard) return;

  const translateX = direction === 'right' ? window.innerWidth : -window.innerWidth;
  topCard.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
  topCard.style.transform = `translateX(${translateX}px) rotate(${direction === 'right' ? 20 : -20}deg)`;
  topCard.style.opacity = '0';

  setTimeout(() => {
    if (currentIndex < filteredCards.length - 1) {
      currentIndex++;
      renderStack();
      updateCounter();
    } else {
      stackContainer.innerHTML = '<div class="empty-state"><div class="emoji">🎉</div><p>Koniec kart w tym trymestrze!</p></div>';
    }
  }, 300);
}

function updateCounter() {
  const current = Math.min(currentIndex + 1, filteredCards.length);
  counter.textContent = `${current}/${filteredCards.length}`;
}

document.querySelectorAll('.trimester-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.trimester-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    selectedTrimester = chip.dataset.trimester;
    filterCards();
  });
});

skipBtn.addEventListener('click', () => swipeCard('left'));
saveBtn.addEventListener('click', () => swipeCard('right'));

filterCards();
</script>

</body>
</html>
